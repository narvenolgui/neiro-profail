<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Нейро-профайл + Тетрадь упражнений</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI','Roboto',system-ui,sans-serif;
      background: linear-gradient(145deg,#f3e9ff 0%,#e0d4f5 100%);
      min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px;
    }
    .container {
      max-width:820px; width:100%; background:rgba(255,255,255,0.92);
      backdrop-filter:blur(10px); border-radius:48px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
      padding:32px 28px; border:1px solid rgba(255,255,255,0.5);
    }
    h1 {
      font-size:2.2rem; font-weight:700; color:#2d1b4e;
      display:flex; align-items:center; gap:10px;
      border-bottom:3px dashed #b185db; padding-bottom:18px;
    }
    h1 span { background:#2d1b4e; color:#fff; font-size:1rem; padding:4px 12px; border-radius:40px; margin-left:8px; }
    .subhead { color:#4a3a5c; font-size:1.1rem; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .badge { background:#b185db; color:#fff; padding:6px 18px; border-radius:40px; font-weight:600; font-size:.9rem; box-shadow:0 6px 12px rgba(177,133,219,0.3); }
    .progress-track { height:8px; background:#d9c5ec; border-radius:20px; margin:20px 0 30px; overflow:hidden; }
    .progress-fill { height:100%; width:0%; background:#2d1b4e; border-radius:20px; transition:width .35s ease; }
    .card { background:#fff; border-radius:32px; padding:28px 24px; box-shadow:0 12px 28px -8px rgba(45,27,78,0.15); border:1px solid #f0e6ff; margin-bottom:18px; }
    .question { font-size:1.6rem; font-weight:700; color:#1e1130; line-height:1.3; margin-bottom:24px; }
    .options { display:flex; flex-direction:column; gap:14px; }
    .option-btn {
      background:#f9f5ff; border:2px solid #e5d5f5; border-radius:60px; padding:16px 22px;
      font-size:1.2rem; font-weight:500; color:#2d1b4e; text-align:left; cursor:pointer;
      transition:all .2s; display:flex; align-items:center; gap:16px;
    }
    .option-btn:hover { background:#ede1ff; border-color:#b185db; transform:scale(1.01); }
    .option-btn.selected { background:#2d1b4e; border-color:#2d1b4e; color:#fff; box-shadow:0 12px 20px -8px #2d1b4e80; }
    .emoji-big { font-size:2rem; }
    .nav-buttons { display:flex; justify-content:space-between; margin-top:12px; }
    .btn {
      background:#fff; border:none; padding:14px 28px; border-radius:60px;
      font-weight:700; font-size:1.1rem; color:#2d1b4e; cursor:pointer;
      box-shadow:0 8px 16px rgba(0,0,0,0.05); border:1px solid #dac0f0; transition:.15s;
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-primary { background:#2d1b4e; color:#fff; border:none; box-shadow:0 12px 20px -5px #2d1b4e99; }
    .btn-primary:hover { background:#412a66; transform:translateY(-2px); }
    .btn-success { background:#2e7d32; color:#fff; border:none; box-shadow:0 12px 20px -5px #2e7d3299; }
    .btn-success:hover { background:#388e3c; transform:translateY(-2px); }
    .btn:disabled { opacity:.4; pointer-events:none; }
    .age-selector { display:flex; gap:20px; justify-content:center; margin:30px 0; }
    .age-btn {
      padding:20px 40px; font-size:1.5rem; border-radius:60px; border:3px solid #dac0f0;
      background:#f9f5ff; cursor:pointer; transition:.2s; font-weight:600; color:#2d1b4e;
    }
    .age-btn:hover { background:#ede1ff; transform:scale(1.05); }
    .age-btn.active { background:#2d1b4e; color:#fff; border-color:#2d1b4e; }

    .result-portrait { background:#fffaf0; border-radius:28px; padding:24px; margin-bottom:20px; border-left:10px solid #b185db; }
    .result-portrait h2 { color:#2d1b4e; margin-bottom:15px; }
    .trait-item { background:#f4edfc; padding:14px 18px; border-radius:16px; margin-bottom:12px; border-left:4px solid #b185db; }
    .trait-item strong { color:#2d1b4e; font-size:1.1rem; display:block; margin-bottom:6px; }
    .trait-desc { color:#3d2a5a; line-height:1.5; }

    .workbook { margin-top:20px; }
    .week-block { background:#f8f2ff; border-radius:28px; padding:20px 24px; margin-bottom:25px; border-left:8px solid #b185db; }
    .week-title { font-size:1.6rem; font-weight:700; color:#1e1130; margin-bottom:15px; }
    .day-row { background:#fff; border-radius:20px; padding:16px 20px; margin-bottom:12px; box-shadow:0 4px 10px rgba(0,0,0,0.04); border:1px solid #ede1ff; }
    .day-title { font-weight:700; font-size:1.2rem; color:#2d1b4e; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
    .exercise-item { padding:12px 14px; background:#f9f5ff; border-radius:16px; margin-bottom:10px; border-left:4px solid #b185db; }
    .exercise-item strong { color:#2d1b4e; font-size:1.1rem; display:block; }
    .exercise-desc { color:#3d2a5a; margin:4px 0; }
    .exercise-why { background:#ede1ff; padding:8px 12px; border-radius:12px; margin:6px 0; font-size:.95rem; color:#2d1b4e; }
    .exercise-why::before { content:"💡 Зачем: "; font-weight:600; }
    .exercise-meta { font-size:.85rem; color:#6a5a7a; display:flex; gap:16px; flex-wrap:wrap; margin-top:4px; }

    .print-only { display:none; }
    .hidden { display:none; }
    .final-actions { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
    .copyright { text-align:center; margin-top:25px; color:#6a5a7a; font-size:.9rem; border-top:1px solid #dac0f0; padding-top:15px; }

    @media print {
      body { background:#fff; padding:0.2in; }
      .container { box-shadow:none; background:#fff; padding:0; }
      .no-print { display:none !important; }
      .print-only { display:block !important; }
      .card { border:1px solid #ccc; box-shadow:none; }
      .workbook .day-row { break-inside:avoid; }
      .result-portrait { border-left-color:#2d1b4e; }
      .copyright { color:#333; }
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <h1>🧠 Нейро-профайл <span>+ тетрадь</span></h1>
  <div class="subhead">
    <span id="statusText">🔍 диагностика</span>
    <span class="badge no-print" id="stepIndicator">шаг 0/7</span>
  </div>
  <div class="progress-track no-print"><div class="progress-fill" id="progressFill"></div></div>
  <div id="dynamicContent" class="card"></div>
  <div class="nav-buttons no-print" id="navButtons">
    <button class="btn" id="prevBtn" disabled>← Назад</button>
    <button class="btn btn-primary" id="nextBtn">Далее →</button>
  </div>
  <div id="printableReport" class="print-only"></div>
  <div class="copyright no-print">© narven_olgui</div>
</div>

<script>
(function(){
  "use strict";

  // =====================================================================
  // КАТАЛОГ УПРАЖНЕНИЙ (45 шт.) – с подробным описанием и объяснением пользы
  // =====================================================================
  const EXERCISES = [
    // ---------- Вестибулярные (v) ----------
    {
      id:'v1', title:'Качели на пледе',
      desc:'Посадите ребёнка на сложенный плед или одеяло. Возьмитесь за два угла и медленно покачивайте вперёд-назад и из стороны в сторону. Делайте 2 минуты, затем отдых.',
      why:'Раскачивание стимулирует вестибулярный аппарат – это улучшает чувство равновесия, координацию движений и помогает ребёнку лучше чувствовать своё тело в пространстве.',
      tags:['vestib_sensitive'], ageGroup:['5-7','7-9'], duration:2, materials:'плед'
    },
    {
      id:'v2', title:'Вращение на стуле',
      desc:'Ребёнок сидит на офисном стуле с колёсиками. Вы медленно вращаете его по кругу (5–7 оборотов в одну сторону, затем в другую). Следите за самочувствием.',
      why:'Вращение активирует вестибулярную систему, что улучшает ориентацию в пространстве и помогает снизить гиперактивность, давая телу нужную дозу движения.',
      tags:['vestib_seeker'], ageGroup:['7-9'], duration:2, materials:'стул на колёсиках'
    },
    {
      id:'v3', title:'Лодочка на полу',
      desc:'Лягте на спину, согните ноги в коленях и поднимите таз – ребёнок садится к вам на живот (спиной к вашей груди). Медленно раскачивайте его из стороны в сторону. 3 минуты.',
      why:'Это упражнение мягко стимулирует вестибулярку и проприоцепцию, укрепляет мышечный корсет и учит ребёнка доверять взрослому, что важно для эмоциональной регуляции.',
      tags:['vestib_sensitive','vestib_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'ковёр'
    },
    {
      id:'v4', title:'Прыжки через линию',
      desc:'Начертите на полу линию мелом или положите верёвку. Ребёнок прыгает через неё вперёд-назад, затем на одной ноге (по 10 раз).',
      why:'Прыжки развивают вестибулярную систему, укрепляют мышцы ног и улучшают координацию. А прыжки на одной ноге тренируют баланс и внимание.',
      tags:['vestib_seeker'], ageGroup:['7-9'], duration:5, materials:'мел или верёвка'
    },
    {
      id:'v5', title:'Кружение с вытянутыми руками',
      desc:'Ребёнок кружится на месте с вытянутыми в стороны руками (5–7 оборотов), затем останавливается и старается удержать равновесие с закрытыми глазами.',
      why:'Кружение – мощный стимул для вестибулярного аппарата. После остановки мозг учится быстро восстанавливать равновесие, что помогает при укачивании и улучшает координацию.',
      tags:['vestib_seeker','vestib_sensitive'], ageGroup:['5-7','7-9'], duration:2, materials:'нет'
    },
    {
      id:'v6', title:'Ходьба по верёвке',
      desc:'Положите верёвку на пол. Ребёнок идёт по ней, стараясь не оступаться. Для усложнения можно пройти с закрытыми глазами или с книгой на голове.',
      why:'Тренирует вестибулярный аппарат и проприоцепцию, учит удерживать равновесие и концентрироваться на своих движениях – полезно для улучшения осанки и внимания.',
      tags:['vestib_sensitive'], ageGroup:['7-9'], duration:4, materials:'верёвка, книга'
    },

    // ---------- Проприоцептивные (p) ----------
    {
      id:'p1', title:'Тачка',
      desc:'Взрослый берёт ребёнка за ноги, ребёнок идёт на руках по комнате. Пройдите 3–5 метров, затем отдохните. Повторите 2–3 раза.',
      why:'Это классическое упражнение даёт сильную проприоцептивную нагрузку: мышцы рук и плечевого пояса получают сигналы о положении тела, улучшается осанка и укрепляется мышечный тонус.',
      tags:['press_weak','motor_restless'], ageGroup:['5-7','7-9'], duration:3, materials:'свободное пространство'
    },
    {
      id:'p2', title:'Тяжёлый мешок',
      desc:'Насыпьте в пакет 1–2 кг крупы (или положите книги). Ребёнок носит этот мешок по комнате (можно на плече) 3–5 минут, затем выполняет спокойное задание.',
      why:'Ношение тяжести даёт глубокую проприоцептивную стимуляцию, которая успокаивает нервную систему, помогает снять перевозбуждение и улучшает концентрацию перед уроками.',
      tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7','7-9'], duration:5, materials:'пакет с крупой или книги'
    },
    {
      id:'p3', title:'Бой подушками',
      desc:'Возьмите две подушки и устройте «бой» – ребёнок толкает вас подушкой, вы – его. 3 минуты активного давления.',
      why:'Сильное давление через подушки даёт проприоцептивную разгрузку, снижает гиперактивность и помогает ребёнку «почувствовать» свои мышцы, что особенно полезно перед сном.',
      tags:['motor_restless','hyper_evening'], ageGroup:['5-7','7-9'], duration:3, materials:'подушки'
    },
    {
      id:'p4', title:'Стенка на стенку',
      desc:'Ребёнок упирается руками в стену и толкает её изо всех сил 5 секунд, затем расслабляется. Повторить 5 раз.',
      why:'Изометрическое напряжение укрепляет мышцы рук и плечевого пояса, улучшает тонус и даёт проприоцептивную обратную связь, что помогает при слабом тонусе рук.',
      tags:['press_weak'], ageGroup:['7-9'], duration:2, materials:'стена'
    },
    {
      id:'p5', title:'Отжимания от стула',
      desc:'Ребёнок ставит руки на край стула и отжимается (10–15 раз). Спина прямая, локти направлены назад.',
      why:'Отжимания укрепляют мышцы рук, груди и спины, повышают общий мышечный тонус, что важно для правильной осанки и хорошего почерка.',
      tags:['press_weak'], ageGroup:['7-9'], duration:3, materials:'стул'
    },
    {
      id:'p6', title:'Толкание стены сзади',
      desc:'Ребёнок садится спиной к стене и упирается ногами, толкая стену ягодицами – 30 секунд, 3 подхода.',
      why:'Это упражнение даёт глубокую проприоцептивную нагрузку на всё тело, помогает снять мышечное напряжение и успокоиться после активных игр.',
      tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7','7-9'], duration:3, materials:'стена'
    },

    // ---------- Тактильные (t) ----------
    {
      id:'t1', title:'Коробка с крупой',
      desc:'Насыпьте в миску фасоль, гречку или рис. Спрячьте внутри мелкие игрушки. Ребёнок ищет их руками, перебирая крупу.',
      why:'Перебирание крупы стимулирует тактильные рецепторы, развивает мелкую моторику и успокаивает нервную систему. Помогает снизить тактильную защиту и избирательность в еде.',
      tags:['oral_defensive','audio_sensitive'], ageGroup:['5-7','7-9'], duration:5, materials:'миска, крупа, игрушки'
    },
    {
      id:'t2', title:'Рисование на спине',
      desc:'Пальцем рисуйте на спине ребёнка фигуры, буквы, цифры – он должен угадать. Затем меняетесь ролями.',
      why:'Тактильная стимуляция спины улучшает восприятие собственного тела, развивает внимание и память, а также укрепляет эмоциональный контакт между вами.',
      tags:['seq_low','seq_mid'], ageGroup:['5-7','7-9'], duration:3, materials:'нет'
    },
    {
      id:'t3', title:'Сенсорная дорожка',
      desc:'Разложите на полу разные текстуры: махровое полотенце, мешок с фасолью, коврик-травка, пупырчатая плёнка. Ребёнок проходит босиком, описывая ощущения.',
      why:'Ходьба по разным поверхностям обогащает тактильный опыт, развивает чувствительность стоп, что положительно влияет на координацию и речевую функцию.',
      tags:['oral_defensive'], ageGroup:['5-7'], duration:4, materials:'разные ткани, плёнка'
    },
    {
      id:'t4', title:'Тактильное лото',
      desc:'В мешочек положите предметы разной формы (ключ, шишка, мячик, вилка). Ребёнок на ощупь угадывает, что это, не заглядывая внутрь.',
      why:'Развивает тактильное восприятие, внимание и мышление. Учит ребёнка опираться на осязание, что полезно при формировании навыков письма и самообслуживания.',
      tags:['audio_sensitive','oral_defensive'], ageGroup:['5-7','7-9'], duration:5, materials:'мешочек, предметы'
    },

    // ---------- Оральные (o) ----------
    {
      id:'o1', title:'Ветерок (дуть на ватку)',
      desc:'Положите на стол ватку или бумажный шарик. Ребёнок дует на него, стараясь загнать в ворота (между коробок).',
      why:'Упражнение развивает оральную мускулатуру, улучшает дыхание и артикуляцию, помогает при пищевой избирательности, так как тренирует мышцы рта и языка.',
      tags:['oral_defensive'], ageGroup:['5-7','7-9'], duration:4, materials:'вата, коробки'
    },
    {
      id:'o2', title:'Жевательная трубочка',
      desc:'Дайте ребёнку соломинку для коктейля и попросите жевать её (не глотать). Можно использовать специальный жевательный тренажёр.',
      why:'Жевательные движения успокаивают нервную систему, насыщают оральную потребность, снижают тревожность и помогают сосредоточиться. Особенно полезно для детей, которые грызут карандаши и рукава.',
      tags:['oral_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'соломинка или жевательный браслет'
    },
    {
      id:'o3', title:'Пение с зажатым носом',
      desc:'Зажмите нос пальцами и попросите ребёнка пропеть песенку или произнести звук «у-у-у». Обратите внимание на выдох.',
      why:'Тренирует оральный выдох и контроль дыхания, укрепляет мышцы мягкого нёба и глотки, что улучшает дикцию и помогает при гнусавости.',
      tags:['oral_defensive'], ageGroup:['7-9'], duration:2, materials:'нет'
    },
    {
      id:'o4', title:'Надувание шарика',
      desc:'Ребёнок надувает воздушный шарик (или просто дует в трубочку, создавая пузыри в воде).',
      why:'Развивает силу дыхательных мышц, улучшает оральную моторику, что положительно сказывается на речи и помогает при нарушениях глотания.',
      tags:['oral_defensive'], ageGroup:['5-7','7-9'], duration:4, materials:'шарик или трубочка'
    },

    // ---------- Мелкая моторика (m) ----------
    {
      id:'m1', title:'Прищепки на верёвку',
      desc:'Натяните верёвку между стульями. Ребёнок должен развесить на ней бельё (носки, платочки) с помощью прищепок.',
      why:'Это упражнение развивает силу пальцев и координацию «глаз-рука», что напрямую влияет на почерк и навыки самообслуживания. Укрепляет мышцы кисти.',
      tags:['press_weak','grip_unstable'], ageGroup:['5-7','7-9'], duration:5, materials:'верёвка, прищепки, мелкие вещи'
    },
    {
      id:'m2', title:'Лепка из пластилина',
      desc:'Слепите 5–10 шариков и расплющите их пальцами. Затем слепите букву или цифру. Используйте разный цвет.',
      why:'Лепка – отличный тренажёр для мелкой моторики. Она укрепляет мышцы пальцев, развивает чувствительность и творческое мышление, а также успокаивает.',
      tags:['press_weak','grip_unstable'], ageGroup:['5-7'], duration:7, materials:'пластилин'
    },
    {
      id:'m3', title:'Пальчиковый твистер',
      desc:'Нарисуйте на листе цветные круги. Ребёнок ставит пальцы на круги (например, указательный на красный, средний на синий) и по команде меняет позиции.',
      why:'Тренирует координацию движений пальцев, внимание и скорость реакции. Полезно для подготовки к письму и работе с клавиатурой.',
      tags:['grip_unstable','seq_mid'], ageGroup:['7-9'], duration:4, materials:'бумага, карандаши'
    },
    {
      id:'m4', title:'Сортировка пуговиц',

  function renderAgeSelection() {
    let html = `
      <div style="text-align:center; padding:10px 0;">
        <div style="font-size:2rem; margin-bottom:10px;">👶</div>
        <h2 style="color:#2d1b4e;">Для какого возраста ребёнка?</h2>
        <p style="color:#4a3a5c; margin:10px 0 20px;">Выберите группу, чтобы упражнения подбирались точно под развитие.</p>
        <div class="age-selector">
          <button class="age-btn" data-age="5-7">5–7 лет</button>
          <button class="age-btn" data-age="7-9">7–9 лет</button>
        </div>
      </div>
    `;
    dynamicContent.innerHTML = html;
    document.querySelectorAll('.age-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        ageGroup = this.dataset.age;
        document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentStep = 1;
        renderQuestion(0);
        updateNavButtons();
      });
    });
    navButtons.style.display = 'none';
    stepIndicator.textContent = 'выбор возраста';
    progressFill.style.width = '0%';
    statusText.textContent = '👶 выбор возраста';
  }

  function renderQuestion(index) {
    navButtons.style.display = 'flex';
    const q = questions[index];
    const saved = answers[index];
    let html = `<div class="question">${index+1}. ${q.text}</div><div class="options">`;
    q.options.forEach(opt => {
      const selected = (saved === opt.value) ? 'selected' : '';
      html += `
        <div class="option-btn ${selected}" data-value="${opt.value}">
          <span class="emoji-big">${opt.emoji}</span>
          <span>${opt.label}</span>
        </div>
      `;
    });
    html += `</div>`;
    dynamicContent.innerHTML = html;

    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const value = this.dataset.value;
        answers[index] = value;
        renderQuestion(index);
        updateNavButtons();
      });
    });

    stepIndicator.textContent = `шаг ${index+1}/${questions.length}`;
    const progress = ((index) / questions.length) * 100;
    progressFill.style.width = progress + '%';
    statusText.textContent = `🧩 вопрос ${index+1}`;
    updateNavButtons();
  }

  function updateNavButtons() {
    if (currentStep === 0) { prevBtn.disabled = true; nextBtn.disabled = true; return; }
    if (currentStep === 8) { prevBtn.disabled = true; nextBtn.disabled = true; return; }
    const hasAnswer = answers[currentStep-1] !== null;
    prevBtn.disabled = (currentStep === 1);
    nextBtn.textContent = (currentStep === questions.length) ? '🧾 Получить результаты' : 'Далее →';
    nextBtn.disabled = !hasAnswer;
  }

  // =====================================================================
  // ГЕНЕРАЦИЯ ТЕТРАДИ (ГАРАНТИРОВАННО БЕЗ ПОВТОРОВ И БЕЗ ФАЛБЭКОВ)
  // =====================================================================
  function generateWorkbook(tags, age) {
    // 1. Отбираем упражнения, подходящие по возрасту и тегам
    let pool = EXERCISES.filter(ex => {
      if (!ex.ageGroup.includes(age) && !ex.ageGroup.includes('both')) return false;
      return ex.tags.some(t => tags.includes(t));
    });

    // 2. Если меньше 40, добавляем все подходящие по возрасту (но без дублей)
    if (pool.length < 40) {
      const allAge = EXERCISES.filter(ex => ex.ageGroup.includes(age) || ex.ageGroup.includes('both'));
      allAge.forEach(ex => {
        if (!pool.find(e => e.id === ex.id)) pool.push(ex);
      });
    }

    // 3. Если всё ещё меньше 40 – добавляем любые упражнения (можно повторять, но мы избегаем)
    // Но у нас 45 упражнений, поэтому для любого возраста должно быть достаточно.
    // В крайнем случае, если не хватает, мы добавим копии с пометкой (но мы постараемся избежать).
    // У нас 45 упражнений, даже если отфильтровать по возрасту 5-7 или 7-9, останется достаточно (около 40).
    // Для уверенности, если pool < 40, добавим все упражнения без фильтрации (но с уникальными id)
    if (pool.length < 40) {
      const all = EXERCISES.slice();
      all.forEach(ex => {
        if (!pool.find(e => e.id === ex.id)) pool.push(ex);
      });
    }

    // Удаляем дубликаты (на всякий случай)
    pool = pool.filter((ex, idx, self) => self.findIndex(e => e.id === ex.id) === idx);

    // 4. Сортируем по релевантности (количество совпадающих тегов)
    pool.sort((a,b) => {
      const aMatch = a.tags.filter(t => tags.includes(t)).length;
      const bMatch = b.tags.filter(t => tags.includes(t)).length;
      return bMatch - aMatch;
    });

    // 5. Группируем по типу (первая буква id)
    const groups = {};
    pool.forEach(ex => {
      const type = ex.id.charAt(0);
      if (!groups[type]) groups[type] = [];
      groups[type].push(ex);
    });

    // Перемешиваем внутри групп
    for (let type in groups) {
      groups[type] = shuffle(groups[type]);
    }

    // 6. Формируем 20 дней, по 2 упражнения в день.
    // Берём упражнения из групп так, чтобы в один день были разные типы.
    const totalDays = 20;
    const exPerDay = 2;
    const usedIds = new Set();
    const weeks = [];

    // Превращаем группы в плоский массив с указанием типа, чтобы легче выбирать
    let allItems = [];
    for (let type in groups) {
      groups[type].forEach(ex => {
        allItems.push({ ...ex, type: type });
      });
    }

    // Перемешиваем allItems (чтобы порядок был случайным)
    allItems = shuffle(allItems);

    // Теперь строим дни: проходим по allItems и берём по два разных типа
    // Если не хватает, дополняем из оставшихся, но стараемся не повторять id.
    const days = [];
    let idx = 0;
    for (let d = 0; d < totalDays; d++) {
      const dayEx = [];
      // Пытаемся найти два разных типа
      // Выбираем из allItems, пропуская уже использованные id
      let found = [];
      let available = allItems.filter(item => !usedIds.has(item.id));
      // Перемешиваем доступные, чтобы разнообразить
      available = shuffle(available);

      // Берём первый попавшийся, затем ищем другой тип
      if (available.length > 0) {
        const first = available[0];
        dayEx.push(first);
        usedIds.add(first.id);
        // Ищем второй с другим типом
        const second = available.find(item => item.type !== first.type && !usedIds.has(item.id));
        if (second) {
          dayEx.push(second);
          usedIds.add(second.id);
        } else {
          // Если нет другого типа, берём любой другой (но не повторяем id)
          const fallback = available.find(item => !usedIds.has(item.id));
          if (fallback) {
            dayEx.push(fallback);
            usedIds.add(fallback.id);
          } else {
            // Это маловероятно, но добавим запасное упражнение (из уже использованных, но это крайний случай)
            const extra = allItems.find(item => !usedIds.has(item.id));
            if (extra) {
              dayEx.push(extra);
              usedIds.add(extra.id);
            }
          }
        }
      }

      // Если по какой-то причине не набрали 2, добираем из оставшихся (любых)
      while (dayEx.length < exPerDay) {
        const leftover = allItems.find(item => !usedIds.has(item.id));
        if (leftover) {
          dayEx.push(leftover);
          usedIds.add(leftover.id);
        } else {
          // Совсем крайний случай – добавляем копию первого упражнения дня (но с изменённым id)
          const copy = { ...dayEx[0], id: dayEx[0].id + '_copy' };
          dayEx.push(copy);
          break;
        }
      }

      days.push(dayEx);
    }

    // 7. Разбиваем на недели (по 5 дней)
    for (let w = 0; w < 4; w++) {
      weeks.push(days.slice(w*5, w*5+5));
    }

    return weeks;
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // =====================================================================
  // ЗАВЕРШЕНИЕ ТЕСТА
  // =====================================================================
  function finishDiagnostic() { showPortrait(); }

  // =====================================================================
  // НАВИГАЦИЯ
  // =====================================================================
  function goToNext() {
    if (currentStep === 0) return;
    if (currentStep <= questions.length) {
      if (answers[currentStep-1] === null) return;
      if (currentStep === questions.length) { finishDiagnostic(); return; }
      currentStep++;
      renderQuestion(currentStep-1);
      updateNavButtons();
    }
  }
  function goToPrev() {
    if (currentStep > 1) { currentStep--; renderQuestion(currentStep-1); updateNavButtons(); }
  }

  // =====================================================================
  // ИНИЦИАЛИЗАЦИЯ
  // =====================================================================
  function init() {
    renderAgeSelection();
    nextBtn.addEventListener('click', goToNext);
    prevBtn.addEventListener('click', goToPrev);

    window.onbeforeprint = function() {
      if (diagnosticFinished) {
        document.getElementById('dynamicContent').style.display = 'none';
        printableReport.style.display = 'block';
        document.querySelector('.subhead').style.display = 'none';
      }
    };
    window.onafterprint = function() {
      if (diagnosticFinished) {
        document.getElementById('dynamicContent').style.display = 'block';
        printableReport.style.display = 'none';
        document.querySelector('.subhead').style.display = 'flex';
      }
    };
  }
  init();
})();
