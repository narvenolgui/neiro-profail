<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(145deg, #f3e9ff 0%, #e0d4f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d1b4e;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            border-bottom: 3px dashed #b185db;
            padding-bottom: 18px;
        }

        h1 span {
            background: #2d1b4e;
            color: white;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: 8px;
        }

        .subhead {
            color: #4a3a5c;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: #b185db;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 6px 12px rgba(177, 133, 219, 0.3);
        }

        .progress-track {
            height: 8px;
            background: #d9c5ec;
            border-radius: 20px;
            margin: 20px 0 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2d1b4e;
            border-radius: 20px;
            transition: width 0.35s ease;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 12px 28px -8px rgba(45, 27, 78, 0.15);
            border: 1px solid #f0e6ff;
            margin-bottom: 18px;
        }

        .question {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e1130;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: #f9f5ff;
            border: 2px solid #e5d5f5;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d1b4e;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .option-btn:hover {
            background: #ede1ff;
            border-color: #b185db;
            transform: scale(1.01);
        }

        .option-btn.selected {
            background: #2d1b4e;
            border-color: #2d1b4e;
            color: white;
            box-shadow: 0 12px 20px -8px #2d1b4e80;
        }

        .emoji-big {
            font-size: 2rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

            background: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2d1b4e;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid #dac0f0;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

            background: #2d1b4e;
            color: white;
            border: none;
            box-shadow: 0 12px 20px -5px #2d1b4e99;
        }

        .btn-primary:hover {
            background: #412a66;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #2e7d32;
            color: white;
            border: none;
            box-shadow: 0 12px 20px -5px #2e7d3299;
        }

        .btn-success:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }

        .age-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 60px;
            border: 3px solid #dac0f0;
            background: #f9f5ff;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            color: #2d1b4e;
        }

        .age-btn:hover {
            background: #ede1ff;
            transform: scale(1.05);
        }

        .age-btn.active {
            background: #2d1b4e;
            color: white;
            border-color: #2d1b4e;
        }

            margin-bottom: 20px;
            border-left: 10px solid #b185db;
        }

            color: #2d1b4e;
            margin-bottom: 15px;
        }

            background: #f4edfc;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #b185db;
        }

        .trait-item strong {
            color: #2d1b4e;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 6px;
        }

        .trait-desc {
            color: #3d2a5a;
            line-height: 1.5;
        }

        .workbook {
            margin-top: 20px;
        }

            background: #f8f2ff;
            border-radius: 28px;

            margin-bottom: 25px;
            border-left: 8px solid #b185db;

            font-weight: 700;
            color: #1e1130;
            margin-bottom: 15px;
        }

            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);

        }

            font-weight: 700;
            font-size: 1.2rem;
            color: #2d1b4e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;

            padding: 12px 14px;
            background: #f9f5ff;
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 4px solid #b185db;
        }

        .exercise-item strong {
            color: #2d1b4e;
            font-size: 1.1rem;
            display: block;
        }

        .exercise-desc {
            color: #3d2a5a;
            margin: 4px 0;
        }

        .exercise-why {
            background: #ede1ff;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 6px 0;
            font-size: .95rem;
            color: #2d1b4e;
        }

        .exercise-why::before {
            content: "💡 Зачем: ";
            font-weight: 600;
        }

        .exercise-meta {
            font-size: .85rem;
            color: #6a5a7a;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .print-only {
            display: none;
        }

        .hidden {
            display: none;
        }

        .final-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-copyright {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #dac0f0;
            color: #6a5a7a;
            font-size: 0.95rem;
        }

            color: #2d1b4e;

                padding: 0.2in;

                background: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .card {
                border: 1px solid #ccc;
                box-shadow: none;
            }
            .workbook .day-row {
                break-inside: avoid;
            }
            .result-portrait {
                border-left-color: #2d1b4e;
            }
        }
    </style>
</head>

        function renderQuestion(index) {
            navButtons.style.display = 'flex';
            const q = questions[index];
            const saved = answers[index];
            let html = `<div class="question">${index+1}. ${q.text}</div><div class="options">`;
            q.options.forEach(opt => {
                const selected = (saved === opt.value) ? 'selected' : '';
                html += `
                    <div class="option-btn ${selected}" data-value="${opt.value}">
                        <span class="emoji-big">${opt.emoji}</span>
                        <span>${opt.label}</span>
                    </div>
                `;
            });
            html += `</div>`;
            dynamicContent.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const value = this.dataset.value;
                    answers[index] = value;
                    renderQuestion(index);
                    updateNavButtons();
                });
            });

            stepIndicator.textContent = `шаг ${index+1}/${questions.length}`;
            const progress = ((index) / questions.length) * 100;
            progressFill.style.width = progress + '%';
            statusText.textContent = `🧩 вопрос ${index+1}`;
            updateNavButtons();
        }

        function updateNavButtons() {
            if (currentStep === 0) { prevBtn.disabled = true;

            if (currentStep === 8) { prevBtn.disabled = true;
                nextBtn.disabled = true; return; }
            const hasAnswer = answers[currentStep - 1] !== null;
            prevBtn.disabled = (currentStep === 1);
            nextBtn.textContent = (currentStep === questions.length) ? '🧾 Получить результаты' : 'Далее →';
            nextBtn.disabled = !hasAnswer;
        }

        // =====================================================================
        // ГЕНЕРАЦИЯ ТЕТРАДИ (БЕЗ ПОВТОРОВ)
        // =====================================================================
        function generateWorkbook(tags, age) {
            let pool = EXERCISES.filter(ex => {
                if (!ex.ageGroup.includes(age) && !ex.ageGroup.includes('both')) return false;
                return ex.tags.some(t => tags.includes(t));
            });
            if (pool.length < 10) {
                const allAge = EXERCISES.filter(ex => ex.ageGroup.includes(age) || ex.ageGroup.includes('both'));
                allAge.forEach(ex => { if (!pool.find(e => e.id === ex.id)) pool.push(ex); });
            }
            pool = pool.filter((ex, idx, self) => self.findIndex(e => e.id === ex.id) === idx);
            pool.sort((a, b) => {
                const aMatch = a.tags.filter(t => tags.includes(t)).length;
                const bMatch = b.tags.filter(t => tags.includes(t)).length;
                return bMatch - aMatch;
            });

            const groups = {};
            pool.forEach(ex => {
                const type = ex.id.charAt(0);
                if (!groups[type]) groups[type] = [];
                groups[type].push(ex);
            });
            for (let type in groups) { groups[type] = shuffle(groups[type]); }

            const totalDays = 20;
            const exPerDay = 2;
            const usedIds = new Set();
            const weeks = [];
            const weekNames = ['1-я неделя (освоение)', '2-я неделя (закрепление)', '3-я неделя (усложнение)',
                '4-я неделя (интеграция)'
            ];

            for (let w = 0; w < 4; w++) {
                const weekDays = [];
                for (let d = 0; d < 5; d++) {
                    const dayEx = [];
                    const available = Object.keys(groups).filter(t => groups[t].length > 0);
                    const shuffledTypes = shuffle(available);
                    let chosenTypes = [];
                    if (shuffledTypes.length >= 2) chosenTypes = shuffledTypes.slice(0, 2);
                    else if (shuffledTypes.length === 1) chosenTypes = [shuffledTypes[0], shuffledTypes[0]];
                    else chosenTypes = ['', ''];

                    for (let t of chosenTypes) {
                        let ex = null;
                        if (t && groups[t] && groups[t].length > 0) {
                            const idx = groups[t].findIndex(e => !usedIds.has(e.id));
                            if (idx !== -1) ex = groups[t].splice(idx, 1)[0];
                        }
                        if (ex) { dayEx.push(ex);
                            usedIds.add(ex.id); }
                    }

                    while (dayEx.length < exPerDay) {
                        let remaining = [];
                        for (let type in groups) remaining = remaining.concat(groups[type]);
                        const avail = remaining.find(e => !usedIds.has(e.id));
                        if (avail) {
                            for (let type in groups) {
                                const idx = groups[type].findIndex(e => e.id === avail.id);
                                if (idx !== -1) { groups[type].splice(idx, 1); break; }
                            }
                            dayEx.push(avail);
                            usedIds.add(avail.id);
                        } else {
                            // Если все упражнения использованы – берём из уже использованных, но меняем id (аварийный случай)
                            const poolCopy = EXERCISES.filter(ex => ex.ageGroup.includes(age) || ex.ageGroup.includes(
                            'both'));
                            const fallback = poolCopy.find(e => !dayEx.some(de => de.id === e.id));
                            if (fallback) {
                                const copy = { ...fallback, id: fallback.id + '_copy' };
                                dayEx.push(copy);
                            } else {
                                // Самый крайний случай
                                const emergency = { id: 'em', title: 'Повторите любое упражнение', desc: 'Выберите то, что понравилось больше всего.', why: 'Поддерживайте активность.', tags: [], ageGroup: ['5-7','7-9'], duration: 2, materials: 'нет' };
                                dayEx.push(emergency);
                            }
                        }
                    }
                    weekDays.push(dayEx);
                }
                weeks.push(weekDays);
            }
            return weeks;
        }

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

            diagnosticFinished = true;
            const tags = answers.filter(a => a !== null);
            const meaningfulTags = tags.filter(t => !['vestib_mid', 'oral_mid', 'seq_good', 'evening_ok', 'audio_normal']
                .includes(t));
            const traits = getTraitsDescription(meaningfulTags);

            let html = `
                <div style="text-align:center; margin-bottom:20px;">
                    <span style="font-size:3rem;">🧠</span>
                    <h2 style="color:#2d1b4e; margin:10px 0;">Нейропсихологический портрет</h2>
                    <p style="color:#4a3a5c;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                </div>
                <div class="result-portrait">
            `;
            if (traits.length === 0) {
                html += `
                    <p style="font-size:1.2rem; color:#2d1b4e;">✅ По результатам диагностики значительных особенностей не выявлено.</p>
                    <p style="color:#4a3a5c;">Рекомендуем поддерживать нейродинамику с помощью подвижных игр и творчества.</p>
                `;
            } else {
                traits.forEach(t => {
                    html += `
                        <div class="trait-item">
                            <strong>${t.title}</strong>
                            <div class="trait-desc">${t.desc}</div>
                        </div>
                    `;
                });
            }
            html += `
                </div>
                <div style="text-align:center;">
                    <button class="btn btn-success" id="generateWorkbookBtn">📘 Получить тетрадь упражнений</button>
                </div>
                <div class="footer-copyright" style="margin-top:20px;">
                    © 2026 <strong>narven_olgui</strong> — нейро-профайл для детей
                </div>
            `;
            dynamicContent.innerHTML = html;
            navButtons.style.display = 'none';
            document.querySelector('.progress-track').style.display = 'none';
            stepIndicator.style.display = 'none';
            statusText.textContent = '📊 результаты готовы';

            document.getElementById('generateWorkbookBtn').addEventListener('click', function() {
                generateAndShowWorkbook(meaningfulTags);
            });
        }

        // =====================================================================
        // ГЕНЕРАЦИЯ И ПОКАЗ ТЕТРАДИ
        // =====================================================================
        function generateAndShowWorkbook(tags) {
            if (workbookGenerated) return;
            workbookGenerated = true;

            const weeks = generateWorkbook(tags, ageGroup);

            let html = `
                <div style="text-align:center; margin-bottom:20px;">
                    <span style="font-size:3rem;">📘</span>
                    <h2 style="color:#2d1b4e; margin:10px 0;">Ваша персональная тетрадь</h2>
                    <p style="color:#4a3a5c;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                </div>
                <div class="workbook">
            `;
            const weekNames = ['1-я неделя (освоение)', '2-я неделя (закрепление)', '3-я неделя (усложнение)',
                '4-я неделя (интеграция)'
            ];
            weeks.forEach((week, wi) => {
                html += `<div class="week-block"><div class="week-title">📅 ${weekNames[wi]}</div>`;
                week.forEach((dayEx, di) => {
                    const dayNum = wi * 5 + di + 1;
                    html += `<div class="day-row"><div class="day-title">📌 День ${dayNum}</div>`;
                    dayEx.forEach(ex => {
                        const dur = ex.duration || '2-3';
                        const mats = ex.materials || 'подручные средства';
                        html += `
                            <div class="exercise-item">
                                <strong>${ex.title}</strong>
                                <div class="exercise-desc">${ex.desc}</div>
                                <div class="exercise-why">${ex.why}</div>
                                <div class="exercise-meta">
                                    <span>⏱ ${dur} мин</span>
                                    <span>🧰 ${mats}</span>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
            });
            html += `
                </div>
                <div style="margin-top:20px; background:#ede1ff; padding:20px; border-radius:24px;">
                    <p style="font-weight:600;">✨ Важный совет:</p>
                    <p>Старайтесь выполнять упражнения ежедневно (кроме выходных). Если ребёнок устал – сократите время, но сохраняйте позитивный настрой. Хвалите за старания, а не за результат.</p>
                </div>
                <div class="final-actions">
                    <button class="btn btn-primary" id="printFullReportBtn">🖨️ Распечатать результаты + тетрадь</button>
                    <button class="btn" id="restartBtn">🔄 Пройти заново</button>
                </div>
                <div class="footer-copyright" style="margin-top:20px;">
                    © 2026 <strong>narven_olgui</strong> — нейро-профайл для детей
                </div>
            `;

            const portraitHtml = document.querySelector('.result-portrait')?.outerHTML || '';
            let fullHtml = `
                <div style="text-align:center; margin-bottom:20px;">
                    <span style="font-size:3rem;">🧠</span>
                    <h2 style="color:#2d1b4e; margin:10px 0;">Нейропсихологический портрет</h2>
                    <p style="color:#4a3a5c;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                </div>
                ${portraitHtml}
                <hr style="margin:30px 0; border:2px dashed #b185db;">
                ${html}
            `;
            dynamicContent.innerHTML = fullHtml;

            document.getElementById('printFullReportBtn').addEventListener('click', function() {
                window.print();
            });
            document.getElementById('restartBtn').addEventListener('click', function() {
                location.reload();
            });

            // Печатная версия
            let printHtml = `
                <div style="font-family:'Segoe UI',Arial; max-width:800px; margin:0 auto; padding:20px;">
                    <div style="border-bottom:3px solid #2d1b4e; padding-bottom:15px; margin-bottom:25px;">
                        <h1 style="color:#2d1b4e; margin:0;">🧠 Нейро-профайл ребёнка</h1>
                        <p style="color:#555;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                    </div>
                    <div style="background:#fffaf0; border-left:10px solid #2d1b4e; padding:20px; margin-bottom:30px;">
                        <h2 style="color:#2d1b4e; margin-top:0;">📋 Особенности развития</h2>
            `;
            const traits = getTraitsDescription(tags);
            if (traits.length === 0) printHtml += `<p>✅ Значительных особенностей не выявлено.</p>`;
            else {
                traits.forEach(t => {
                    printHtml += `
                        <div style="margin-bottom:12px;">
                            <strong>${t.title}</strong>
                            <p style="margin:4px 0 0 20px; color:#444;">${t.desc}</p>
                        </div>
                    `;
                });
            }
            printHtml += `</div><h2 style="color:#2d1b4e;">📘 Тетрадь упражнений</h2>`;
            weeks.forEach((week, wi) => {
                printHtml +=
                    `<div style="margin-bottom:25px; border-left:6px solid #b185db; padding-left:20px;"><h3 style="color:#2d1b4e;">${weekNames[wi]}</h3>`;
                week.forEach((dayEx, di) => {
                    const dayNum = wi * 5 + di + 1;
                    printHtml +=
                        `<div style="background:#f9f5ff; border-radius:16px; padding:12px; margin-bottom:10px;"><strong>День ${dayNum}</strong>`;
                    dayEx.forEach(ex => {
                        printHtml += `
                            <div style="margin:6px 0; padding:6px 10px; background:#fff; border-radius:12px; border-left:4px solid #b185db;">
                                <strong>${ex.title}</strong><br>
                                <span style="color:#444;">${ex.desc}</span><br>
                                <span style="font-size:.9rem; color:#777;">⏱ ${ex.duration||2} мин · 🧰 ${ex.materials||'подручные средства'}</span><br>
                                <span style="font-size:.9rem; color:#2d1b4e;">💡 ${ex.why}</span>
                            </div>
                        `;
                    });
                    printHtml += `</div>`;
                });
                printHtml += `</div>`;
            });
            printHtml += `
                    <div style="margin-top:30px; background:#ede1ff; padding:20px; border-radius:24px;">
                        <p style="font-weight:600;">✨ Совет:</p>
                        <p>Выполняйте упражнения ежедневно (кроме выходных). Если ребёнок устал – сократите время, но старайтесь делать хотя бы одно упражнение.</p>
                    </div>
                    <p style="margin-top:30px; color:#4a3a5c; text-align:right;">© 2026 narven_olgui — нейро-профайл для детей</p>
                </div>
            `;
            printableReport.innerHTML = printHtml;
            statusText.textContent = '📘 тетрадь готова';
        }

        // =====================================================================
        // ЗАВЕРШЕНИЕ ТЕСТА
        // =====================================================================
        function finishDiagnostic() { showPortrait(); }

        // =====================================================================
        // НАВИГАЦИЯ
        // =====================================================================
        function goToNext() {
            if (currentStep === 0) return;
            if (currentStep <= questions.length) {
                if (answers[currentStep - 1] === null) return;
                if (currentStep === questions.length) { finishDiagnostic(); return; }
                currentStep++;
                renderQuestion(currentStep - 1);
                updateNavButtons();
            }
        }

        function goToPrev() {
            if (currentStep > 1) { currentStep--;
                renderQuestion(currentStep - 1);
                updateNavButtons(); }
        }

        // =====================================================================
        // ИНИЦИАЛИЗАЦИЯ
        // =====================================================================
        function init() {
            renderAgeSelection();
            nextBtn.addEventListener('click', goToNext);
            prevBtn.addEventListener('click', goToPrev);

            window.onbeforeprint = function() {
                if (diagnosticFinished) {
                    document.getElementById('dynamicContent').style.display = 'none';
                    printableReport.style.display = 'block';
                    document.querySelector('.subhead').style.display = 'none';
                }
            };
            window.onafterprint = function() {
                if (diagnosticFinished) {
                    document.getElementById('dynamicContent').style.display = 'block';
                    printableReport.style.display = 'none';
                    document.querySelector('.subhead').style.display = 'flex';
                }
            };
        }
        init();
    })();
</script>
</body>
</html>
