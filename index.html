<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Нейро-профайл + Тетрадь упражнений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(145deg, #f3e9ff 0%, #e0d4f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d1b4e;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px dashed #b185db;
            padding-bottom: 18px;
        }
        h1 span {
            background: #2d1b4e;
            color: white;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: 8px;
        }
        .subhead {
            color: #4a3a5c;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: #b185db;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: .9rem;
            box-shadow: 0 6px 12px rgba(177, 133, 219, 0.3);
        }
        .progress-track {
            height: 8px;
            background: #d9c5ec;
            border-radius: 20px;
            margin: 20px 0 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2d1b4e;
            border-radius: 20px;
            transition: width .35s ease;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 12px 28px -8px rgba(45, 27, 78, 0.15);
            border: 1px solid #f0e6ff;
            margin-bottom: 18px;
        }
        .question {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e1130;
            line-height: 1.3;
            margin-bottom: 24px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-btn {
            background: #f9f5ff;
            border: 2px solid #e5d5f5;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d1b4e;
            text-align: left;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .option-btn:hover {
            background: #ede1ff;
            border-color: #b185db;
            transform: scale(1.01);
        }
        .option-btn.selected {
            background: #2d1b4e;
            border-color: #2d1b4e;
            color: white;
            box-shadow: 0 12px 20px -8px #2d1b4e80;
        }
        .emoji-big {
            font-size: 2rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }
        .btn {
            background: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2d1b4e;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid #dac0f0;
            transition: .15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #2d1b4e;
            color: white;
            border: none;
            box-shadow: 0 12px 20px -5px #2d1b4e99;
        }
        .btn-primary:hover {
            background: #412a66;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #2e7d32;
            color: white;
            border: none;
            box-shadow: 0 12px 20px -5px #2e7d3299;
        }
        .btn-success:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: .4;
            pointer-events: none;
        }
        .age-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }
        .age-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 60px;
            border: 3px solid #dac0f0;
            background: #f9f5ff;
            cursor: pointer;
            transition: .2s;
            font-weight: 600;
            color: #2d1b4e;
        }
        .age-btn:hover {
            background: #ede1ff;
            transform: scale(1.05);
        }
        .age-btn.active {
            background: #2d1b4e;
            color: white;
            border-color: #2d1b4e;
        }

        .result-portrait {
            background: #fffaf0;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 10px solid #b185db;
        }
        .result-portrait h2 {
            color: #2d1b4e;
            margin-bottom: 15px;
        }
        .trait-item {
            background: #f4edfc;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #b185db;
        }
        .trait-item strong {
            color: #2d1b4e;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 6px;
        }
        .trait-desc {
            color: #3d2a5a;
            line-height: 1.5;
        }

        .workbook {
            margin-top: 20px;
        }
        .week-block {
            background: #f8f2ff;
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 25px;
            border-left: 8px solid #b185db;
        }
        .week-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e1130;
            margin-bottom: 15px;
        }
        .day-row {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
            border: 1px solid #ede1ff;
        }
        .day-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2d1b4e;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .exercise-item {
            padding: 12px 14px;
            background: #f9f5ff;
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 4px solid #b185db;
        }
        .exercise-item strong {
            color: #2d1b4e;
            font-size: 1.1rem;
            display: block;
        }
        .exercise-desc {
            color: #3d2a5a;
            margin: 4px 0;
        }
        .exercise-why {
            background: #ede1ff;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 6px 0;
            font-size: .95rem;
            color: #2d1b4e;
        }
        .exercise-why::before {
            content: "💡 Зачем: ";
            font-weight: 600;
        }
        .exercise-meta {
            font-size: .85rem;
            color: #6a5a7a;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .exercise-tag {
            background: #d9c5ec;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: .75rem;
            color: #2d1b4e;
        }

        .print-only {
            display: none;
        }
        .final-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-copyright {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #dac0f0;
            color: #6a5a7a;
            font-size: .95rem;
        }
        .footer-copyright strong {
            color: #2d1b4e;
        }

        @media print {
            body {
                background: white;
                padding: 0.2in;
            }
            .container {
                box-shadow: none;
                background: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .card {
                border: 1px solid #ccc;
                box-shadow: none;
            }
            .workbook .day-row {
                break-inside: avoid;
            }
            .result-portrait {
                border-left-color: #2d1b4e;
            }
        }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <h1>🧠 Нейро-профайл <span>+ тетрадь</span></h1>
    <div class="subhead">
        <span id="statusText">🔍 диагностика</span>
        <span class="badge no-print" id="stepIndicator">шаг 0/7</span>
    </div>
    <div class="progress-track no-print"><div class="progress-fill" id="progressFill"></div></div>
    <div id="dynamicContent" class="card"></div>
    <div class="nav-buttons no-print" id="navButtons">
        <button class="btn" id="prevBtn" disabled>← Назад</button>
        <button class="btn btn-primary" id="nextBtn">Далее →</button>
    </div>
    <div id="printableReport" class="print-only"></div>
    <div class="footer-copyright no-print">© 2026 <strong>narven_olgui</strong> — нейро-профайл для детей</div>
</div>

<script>
(function() {
    "use strict";

    // =====================================================================
    // РАСШИРЕННЫЙ КАТАЛОГ УПРАЖНЕНИЙ (82 шт., равномерно по 8 областям)
    // =====================================================================
    const EXERCISES = [
        // ===== ВЕСТИБУЛЯРНЫЕ (v) – 12 шт. =====
        { id:'v1', title:'Качели на пледе', desc:'Посадите ребёнка на сложенный плед, возьмитесь за углы и медленно покачивайте вперёд-назад и из стороны в сторону.', why:'Стимулирует вестибулярный аппарат, улучшает равновесие и координацию.', tags:['vestib_sensitive'], ageGroup:['5-7','7-9'], duration:2, materials:'плед' },
        { id:'v2', title:'Вращение на стуле', desc:'Ребёнок сидит на офисном стуле, вы медленно вращаете его по кругу (5–7 оборотов).', why:'Активирует вестибулярную систему, улучшает ориентацию в пространстве.', tags:['vestib_seeker'], ageGroup:['7-9'], duration:2, materials:'стул на колёсиках' },
        { id:'v3', title:'Лодочка на полу', desc:'Лягте на спину, согните ноги, ребёнок садится к вам на живот. Раскачивайте его из стороны в сторону.', why:'Мягкая вестибулярная стимуляция и укрепление мышечного корсета.', tags:['vestib_sensitive','vestib_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'ковёр' },
        { id:'v4', title:'Прыжки через линию', desc:'Начертите линию, ребёнок прыгает через неё вперёд-назад, затем на одной ноге (по 10 раз).', why:'Развивает вестибулярку, укрепляет ноги и тренирует баланс.', tags:['vestib_seeker'], ageGroup:['7-9'], duration:5, materials:'мел или верёвка' },
        { id:'v5', title:'Кружение с вытянутыми руками', desc:'Ребёнок кружится на месте с вытянутыми руками (5–7 оборотов), затем ловит равновесие.', why:'Тренирует вестибулярный аппарат и учит быстро восстанавливать равновесие.', tags:['vestib_seeker','vestib_sensitive'], ageGroup:['5-7','7-9'], duration:2, materials:'нет' },
        { id:'v6', title:'Ходьба по верёвке', desc:'Положите верёвку, ребёнок идёт по ней, стараясь не оступаться. Усложнение – с закрытыми глазами.', why:'Улучшает равновесие, осанку и концентрацию внимания.', tags:['vestib_sensitive'], ageGroup:['7-9'], duration:4, materials:'верёвка' },
        { id:'v7', title:'Баланс на одной ноге', desc:'Ребёнок стоит на одной ноге, стараясь удержать равновесие 10–15 секунд. Затем меняет ногу.', why:'Тренирует вестибулярный аппарат, укрепляет мышцы ног и учит концентрироваться.', tags:['vestib_sensitive','vestib_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'нет' },
        { id:'v8', title:'Ходьба по наклонной', desc:'Положите доску под наклоном (например, на диван). Ребёнок поднимается вверх и спускается вниз.', why:'Стимулирует вестибулярную систему в вертикальной плоскости, улучшает координацию.', tags:['vestib_seeker'], ageGroup:['5-7','7-9'], duration:4, materials:'доска, диван' },
        { id:'v9', title:'Летающий ковёр', desc:'Ребёнок ложится на живот на плед, взрослый медленно тащит его по полу, меняя направление.', why:'Даёт интенсивную вестибулярную стимуляцию, укрепляет мышцы спины и шеи.', tags:['vestib_sensitive','vestib_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'плед' },
        { id:'v10', title:'Прыжки на батуте (или на кровати)', desc:'Ребёнок прыгает на батуте или пружинной кровати, стараясь поддерживать ритм.', why:'Вестибулярная и проприоцептивная нагрузка, улучшает тонус и координацию.', tags:['vestib_seeker'], ageGroup:['5-7','7-9'], duration:5, materials:'батут или кровать' },
        { id:'v11', title:'Гимнастический мостик', desc:'Ребёнок встаёт на мостик (прогибается назад, опираясь на руки и ноги), держит 5–10 секунд.', why:'Развивает гибкость, укрепляет спину и стимулирует вестибулярку.', tags:['vestib_sensitive'], ageGroup:['7-9'], duration:2, materials:'ковёр' },
        { id:'v12', title:'Кувырки вперёд', desc:'Ребёнок делает 3–5 кувырков вперёд на мягком ковре.', why:'Мощная вестибулярная стимуляция, улучшает планирование движений.', tags:['vestib_seeker'], ageGroup:['5-7','7-9'], duration:3, materials:'ковёр' },

        // ===== ПРОПРИОЦЕПТИВНЫЕ (p) – 12 шт. =====
        { id:'p1', title:'Тачка', desc:'Взрослый держит ребёнка за ноги, ребёнок идёт на руках 3–5 метров.', why:'Даёт сильную проприоцептивную нагрузку, укрепляет руки и плечевой пояс.', tags:['press_weak','motor_restless'], ageGroup:['5-7','7-9'], duration:3, materials:'свободное пространство' },
        { id:'p2', title:'Тяжёлый мешок', desc:'Насыпьте в пакет 1–2 кг крупы, ребёнок носит его по комнате 3–5 минут.', why:'Глубокая проприоцептивная стимуляция успокаивает нервную систему.', tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7','7-9'], duration:5, materials:'пакет с крупой' },
        { id:'p3', title:'Бой подушками', desc:'Устройте «бой» подушками – ребёнок толкает вас, вы – его.', why:'Снимает гиперактивность, даёт проприоцептивную разгрузку.', tags:['motor_restless','hyper_evening'], ageGroup:['5-7','7-9'], duration:3, materials:'подушки' },
        { id:'p4', title:'Стенка на стенку', desc:'Ребёнок упирается руками в стену и толкает её 5 секунд, повторяет 5 раз.', why:'Укрепляет мышцы рук, даёт проприоцептивную обратную связь.', tags:['press_weak'], ageGroup:['7-9'], duration:2, materials:'стена' },
        { id:'p5', title:'Отжимания от стула', desc:'Ребёнок ставит руки на край стула и отжимается (10–15 раз).', why:'Укрепляет руки, грудь и спину, улучшает осанку.', tags:['press_weak'], ageGroup:['7-9'], duration:3, materials:'стул' },
        { id:'p6', title:'Толкание стены сзади', desc:'Ребёнок садится спиной к стене и толкает её ягодицами – 30 секунд, 3 подхода.', why:'Глубокая проприоцептивная нагрузка на всё тело, помогает успокоиться.', tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7','7-9'], duration:3, materials:'стена' },
        { id:'p7', title:'Сжимание мячика', desc:'Ребёнок сжимает резиновый мячик или эспандер 10–15 раз каждой рукой.', why:'Укрепляет мышцы кисти, улучшает тонус рук.', tags:['press_weak','grip_unstable'], ageGroup:['5-7','7-9'], duration:3, materials:'мячик или эспандер' },
        { id:'p8', title:'Массаж спины мячиком', desc:'Ребёнок ложится на пол, вы прокатываете теннисный мячик по его спине с небольшим нажимом.', why:'Даёт глубокую проприоцептивную стимуляцию, успокаивает и улучшает осанку.', tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7','7-9'], duration:4, materials:'теннисный мячик' },
        { id:'p9', title:'Ходьба с грузом на спине', desc:'Положите ребёнку на спину небольшую книгу или мешочек с песком, он ходит по комнате.', why:'Улучшает осанку и даёт проприоцептивную нагрузку.', tags:['press_weak','motor_restless'], ageGroup:['5-7','7-9'], duration:3, materials:'книга или мешочек' },
        { id:'p10', title:'Тяни-толкай', desc:'Взрослый и ребёнок толкают друг друга ладонями, стараясь сдвинуть с места.', why:'Даёт сопротивление и проприоцептивную стимуляцию.', tags:['motor_restless','hyper_evening'], ageGroup:['5-7','7-9'], duration:3, materials:'нет' },
        { id:'p11', title:'Катание на плечах', desc:'Ребёнок сидит на плечах взрослого, взрослый медленно приседает и встаёт.', why:'Глубокая проприоцептивная нагрузка на всё тело, укрепляет мышцы ног.', tags:['hyper_evening','fatigue_evening'], ageGroup:['5-7'], duration:3, materials:'нет' },
        { id:'p12', title:'Пресс-упражнение', desc:'Ребёнок ложится на спину, поднимает ноги и голову, держит 5–10 секунд.', why:'Укрепляет мышцы живота и спины, улучшает тонус.', tags:['press_weak'], ageGroup:['7-9'], duration:2, materials:'ковёр' },

        // ===== ТАКТИЛЬНЫЕ (t) – 10 шт. =====
        { id:'t1', title:'Коробка с крупой', desc:'В миске с фасолью или рисом спрячьте игрушки, ребёнок ищет их руками.', why:'Стимулирует тактильные рецепторы, развивает мелкую моторику и успокаивает.', tags:['oral_defensive','audio_sensitive'], ageGroup:['5-7','7-9'], duration:5, materials:'миска, крупа, игрушки' },
        { id:'t2', title:'Рисование на спине', desc:'Пальцем рисуйте на спине ребёнка фигуры – он угадывает, затем меняетесь.', why:'Тактильная стимуляция, развитие внимания и эмоционального контакта.', tags:['seq_low','seq_mid'], ageGroup:['5-7','7-9'], duration:3, materials:'нет' },
        { id:'t3', title:'Сенсорная дорожка', desc:'Разложите на полу разные текстуры (полотенце, мешок с фасолью, пупырчатая плёнка). Ребёнок проходит босиком.', why:'Обогащает тактильный опыт, развивает чувствительность стоп и координацию.', tags:['oral_defensive'], ageGroup:['5-7'], duration:4, materials:'разные ткани' },
        { id:'t4', title:'Тактильное лото', desc:'В мешочек положите предметы разной формы, ребёнок на ощупь угадывает, что это.', why:'Развивает тактильное восприятие, внимание и мышление.', tags:['audio_sensitive','oral_defensive'], ageGroup:['5-7','7-9'], duration:5, materials:'мешочек, предметы' },
        { id:'t5', title:'Мокрые-сухие', desc:'Ребёнок трогает по очереди влажную и сухую ткань, описывает ощущения.', why:'Развивает тактильную чувствительность и речь.', tags:['oral_defensive','audio_sensitive'], ageGroup:['5-7','7-9'], duration:3, materials:'влажная и сухая ткань' },

    function renderQuestion(index) {
        navButtons.style.display = 'flex';
        const q = questions[index];
        const saved = answers[index];
        let html = `<div class="question">${index+1}. ${q.text}</div><div class="options">`;
        q.options.forEach(opt => {
            const selected = (saved === opt.value) ? 'selected' : '';
            html += `
                <div class="option-btn ${selected}" data-value="${opt.value}">
                    <span class="emoji-big">${opt.emoji}</span>
                    <span>${opt.label}</span>
                </div>
            `;
        });
        html += `</div>`;
        dynamicContent.innerHTML = html;

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const value = this.dataset.value;
                answers[index] = value;
                renderQuestion(index);
                updateNavButtons();
            });
        });

        stepIndicator.textContent = `шаг ${index+1}/${questions.length}`;
        const progress = ((index) / questions.length) * 100;
        progressFill.style.width = progress + '%';
        statusText.textContent = `🧩 вопрос ${index+1}`;
        updateNavButtons();
    }

    function updateNavButtons() {
        if (currentStep === 0) { prevBtn.disabled = true; nextBtn.disabled = true; return; }

        nextBtn.disabled = !hasAnswer;

    // =====================================================================
    // ГЕНЕРАЦИЯ ТЕТРАДИ (ТОЛЬКО РЕЛЕВАНТНЫЕ УПРАЖНЕНИЯ)
    // =====================================================================
    function generateWorkbook(tags, age) {
        // 1. Отбираем только те упражнения, у которых есть совпадение с тегами И подходят по возрасту
        let pool = EXERCISES.filter(ex => {
            if (!ex.ageGroup.includes(age) && !ex.ageGroup.includes('both')) return false;
            return ex.tags.some(t => tags.includes(t));
        });

        // 2. Убираем дубликаты (на всякий случай)
        pool = pool.filter((ex, idx, self) => self.findIndex(e => e.id === ex.id) === idx);

        // 3. Сортируем по релевантности (количество совпавших тегов)
        pool.sort((a,b) => {
            const aMatch = a.tags.filter(t => tags.includes(t)).length;
            const bMatch = b.tags.filter(t => tags.includes(t)).length;
            return bMatch - aMatch;
        });

        // 4. Если упражнений меньше 2 – возвращаем пустой массив (тетрадь не формируется)
        if (pool.length < 2) {
            return [];
        }

        // 5. Перемешиваем, чтобы дни были разнообразными
        pool = shuffle(pool);

        // 6. Определяем количество дней: максимум 20, но не больше, чем pool.length / 2
        const maxDays = Math.min(20, Math.floor(pool.length / 2));
        if (maxDays === 0) return [];

        // 7. Берём ровно maxDays * 2 упражнений (по 2 на день)
        const needed = maxDays * 2;
        const selected = pool.slice(0, needed);

        // 8. Группируем по типу (первая буква id) для чередования
        const groups = {};
        selected.forEach(ex => {
            const type = ex.id.charAt(0);
            if (!groups[type]) groups[type] = [];
            groups[type].push(ex);
        });

        // 9. Раскладываем по дням (по 2 упражнения, желательно разных типов)
        const days = [];
        const typeKeys = shuffle(Object.keys(groups));

        for (let d = 0; d < maxDays; d++) {
            const dayEx = [];
            // Выбираем два разных типа (если возможно)
            const availableTypes = typeKeys.filter(t => groups[t] && groups[t].length > 0);
            let chosenTypes = [];
            if (availableTypes.length >= 2) {
                chosenTypes = availableTypes.slice(0, 2);
            } else if (availableTypes.length === 1) {
                chosenTypes = [availableTypes[0], availableTypes[0]];
            } else {
                break; // не должно случиться
            }

            for (let t of chosenTypes) {
                if (groups[t] && groups[t].length > 0) {
                    const ex = groups[t].shift();
                    dayEx.push(ex);
                }
            }

            // Если всё же не набрали 2 – добираем из оставшихся (любых)
            while (dayEx.length < 2) {
                for (let type of typeKeys) {
                    if (groups[type] && groups[type].length > 0) {
                        const ex = groups[type].shift();
                        dayEx.push(ex);
                        break;
                    }
                }
                if (dayEx.length < 2) break; // аварийный выход
            }

            days.push(dayEx);
        }

        // 10. Разбиваем на недели по 5 дней
        const weeks = [];
        for (let w = 0; w < Math.ceil(days.length / 5); w++) {
            weeks.push(days.slice(w*5, w*5+5));
        }

        return weeks;
    }

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

        const totalDays = weeks.reduce((acc, w) => acc + w.length, 0);

        let html = `
            <div style="text-align:center; margin-bottom:20px;">
                <span style="font-size:3rem;">📘</span>
                <h2 style="color:#2d1b4e; margin:10px 0;">Ваша персональная тетрадь</h2>
                <p style="color:#4a3a5c;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                <p style="color:#4a3a5c;">Количество дней: ${totalDays}</p>
            </div>
            <div class="workbook">
        `;

        const weekNames = ['1-я неделя (освоение)','2-я неделя (закрепление)','3-я неделя (усложнение)','4-я неделя (интеграция)'];
        weeks.forEach((week, wi) => {
            if (week.length === 0) return;
            html += `<div class="week-block"><div class="week-title">📅 ${weekNames[wi] || (wi+1 + '-я неделя')}</div>`;
            week.forEach((dayEx, di) => {
                const dayNum = wi*5 + di + 1;
                html += `<div class="day-row"><div class="day-title">📌 День ${dayNum}</div>`;
                dayEx.forEach(ex => {
                    const dur = ex.duration || '2-3';
                    const mats = ex.materials || 'подручные средства';
                    html += `
                        <div class="exercise-item">
                            <strong>${ex.title}</strong>
                            <div class="exercise-desc">${ex.desc}</div>
                            <div class="exercise-why">${ex.why}</div>
                            <div class="exercise-meta">
                                <span>⏱ ${dur} мин</span>
                                <span>🧰 ${mats}</span>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });
            html += `</div>`;
        });

        html += `
            </div>
            <div style="margin-top:20px; background:#ede1ff; padding:20px; border-radius:24px;">
                <p style="font-weight:600;">✨ Важный совет:</p>
                <p>Старайтесь выполнять упражнения ежедневно (кроме выходных). Если ребёнок устал – сократите время, но сохраняйте позитивный настрой. Хвалите за старания, а не за результат.</p>
            </div>
            <div class="final-actions">
                <button class="btn btn-primary" id="printFullReportBtn">🖨️ Распечатать результаты + тетрадь</button>
                <button class="btn" id="restartBtn">🔄 Пройти заново</button>
            </div>
            <div class="footer-copyright" style="margin-top:20px;">© 2026 <strong>narven_olgui</strong> — нейро-профайл для детей</div>
        `;

        const portraitHtml = document.querySelector('.result-portrait')?.outerHTML || '';
        let fullHtml = `
            <div style="text-align:center; margin-bottom:20px;">
                <span style="font-size:3rem;">🧠</span>
                <h2 style="color:#2d1b4e; margin:10px 0;">Нейропсихологический портрет</h2>
                <p style="color:#4a3a5c;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
            </div>
            ${portraitHtml}
            <hr style="margin:30px 0; border:2px dashed #b185db;">
            ${html}
        `;
        dynamicContent.innerHTML = fullHtml;

        document.getElementById('printFullReportBtn').addEventListener('click', function() {
            window.print();
        });
        document.getElementById('restartBtn').addEventListener('click', function() {
            location.reload();
        });

        // Печатная версия
        let printHtml = `
            <div style="font-family:'Segoe UI',Arial; max-width:800px; margin:0 auto; padding:20px;">
                <div style="border-bottom:3px solid #2d1b4e; padding-bottom:15px; margin-bottom:25px;">
                    <h1 style="color:#2d1b4e; margin:0;">🧠 Нейро-профайл ребёнка</h1>
                    <p style="color:#555;">Возраст: ${ageGroup} лет · ${new Date().toLocaleDateString('ru-RU')}</p>
                </div>
                <div style="background:#fffaf0; border-left:10px solid #2d1b4e; padding:20px; margin-bottom:30px;">
                    <h2 style="color:#2d1b4e; margin-top:0;">📋 Особенности развития</h2>
        `;
        const traits = getTraitsDescription(tags);
        if (traits.length === 0) printHtml += `<p>✅ Значительных особенностей не выявлено.</p>`;
        else {
            traits.forEach(t => {
                printHtml += `
                    <div style="margin-bottom:12px;">
                        <strong>${t.title}</strong>
                        <p style="margin:4px 0 0 20px; color:#444;">${t.desc}</p>
                    </div>
                `;
            });
        }
        printHtml += `</div><h2 style="color:#2d1b4e;">📘 Тетрадь упражнений</h2>`;
        weeks.forEach((week, wi) => {
            if (week.length === 0) return;
            printHtml += `<div style="margin-bottom:25px; border-left:6px solid #b185db; padding-left:20px;"><h3 style="color:#2d1b4e;">${weekNames[wi] || (wi+1 + '-я неделя')}</h3>`;
            week.forEach((dayEx, di) => {
                const dayNum = wi*5 + di + 1;
                printHtml += `<div style="background:#f9f5ff; border-radius:16px; padding:12px; margin-bottom:10px;"><strong>День ${dayNum}</strong>`;
                dayEx.forEach(ex => {
                    printHtml += `
                        <div style="margin:6px 0; padding:6px 10px; background:#fff; border-radius:12px; border-left:4px solid #b185db;">
                            <strong>${ex.title}</strong><br>
                            <span style="color:#444;">${ex.desc}</span><br>
                            <span style="font-size:.9rem; color:#777;">⏱ ${ex.duration||2} мин · 🧰 ${ex.materials||'подручные средства'}</span><br>
                            <span style="font-size:.9rem; color:#2d1b4e;">💡 ${ex.why}</span>
                        </div>
                    `;
                });
                printHtml += `</div>`;
            });
            printHtml += `</div>`;
        });
        printHtml += `
                <div style="margin-top:30px; background:#ede1ff; padding:20px; border-radius:24px;">
                    <p style="font-weight:600;">✨ Совет:</p>
                    <p>Выполняйте упражнения ежедневно (кроме выходных). Если ребёнок устал – сократите время, но старайтесь делать хотя бы одно упражнение.</p>
                </div>
                <p style="margin-top:30px; color:#4a3a5c; text-align:right;">© 2026 narven_olgui — нейро-профайл для детей</p>
            </div>
        `;
        printableReport.innerHTML = printHtml;
        statusText.textContent = '📘 тетрадь готова';
    }

    // =====================================================================
    // ЗАВЕРШЕНИЕ ТЕСТА
    // =====================================================================
    function finishDiagnostic() { showPortrait(); }

    // =====================================================================
    // НАВИГАЦИЯ
    // =====================================================================
    function goToNext() {
        if (currentStep === 0) return;
        if (currentStep <= questions.length) {
            if (answers[currentStep-1] === null) return;
            if (currentStep === questions.length) { finishDiagnostic(); return; }
            currentStep++;
            renderQuestion(currentStep-1);
            updateNavButtons();
        }
    }
    function goToPrev() {
        if (currentStep > 1) { currentStep--; renderQuestion(currentStep-1); updateNavButtons(); }
    }

    // =====================================================================
    // ИНИЦИАЛИЗАЦИЯ
    // =====================================================================
    function init() {
        renderAgeSelection();
        nextBtn.addEventListener('click', goToNext);
        prevBtn.addEventListener('click', goToPrev);

        window.onbeforeprint = function() {
            if (diagnosticFinished) {
                document.getElementById('dynamicContent').style.display = 'none';
                printableReport.style.display = 'block';
                document.querySelector('.subhead').style.display = 'none';
            }
        };
        window.onafterprint = function() {
            if (diagnosticFinished) {
                document.getElementById('dynamicContent').style.display = 'block';
                printableReport.style.display = 'none';
                document.querySelector('.subhead').style.display = 'flex';
            }
        };
    }
    init();
})();
</script>
</body>
</html>
